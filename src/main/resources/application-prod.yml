spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript

logging:
  level:
    com.dosotres: INFO
    root: WARN
