spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: Symphōn
    version: 1.0.0
    description: Red social de oración colaborativa

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%logger{36}","msg":"%m"}%n'
  level:
    com.dosotres: INFO
    root: WARN
