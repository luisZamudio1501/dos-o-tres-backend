spring:
  application:
    name: dosotres-backend
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-min-32-chars-long!!}
    expiration-ms: 86400000
  timer:
    abandon-threshold-minutes: 30
    cleanup-cron: "0 */15 * * * *"
  goal:
    reminder-cron: "0 */5 * * * *"
  push:
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:soporte@mateo1819.org}
