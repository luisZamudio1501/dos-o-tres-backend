spring:
  application:
    name: dosotres-backend
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-min-32-chars-long!!}
    expiration-ms: 86400000
  timer:
    abandon-threshold-minutes: 30
    cleanup-cron: "0 */15 * * * *"
  goal:
    reminder-cron: "0 */5 * * * *"
  push:
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:soporte@mateo1819.org}
  mail:
    from: "Mateo1819 <noreply@mateo1819.org>"
    support: soporte@mateo1819.org
    base-url: ${APP_BASE_URL:https://app.mateo1819.org}
  reengagement:
    stale-days: 3
    cron: "0 0 9 * * *"
  public-wall:
    archive:
      cron: "0 30 3 * * *"
