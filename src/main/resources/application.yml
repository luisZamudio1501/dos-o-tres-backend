spring:
  application:
    name: dosotres-backend
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-min-32-chars-long!!}
    expiration-ms: 86400000
  timer:
    abandon-threshold-minutes: 30
    cleanup-cron: "0 */15 * * * *"
